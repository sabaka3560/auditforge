<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #2a2a2a;
      --border2:   #333;
      --text:      #e5e7eb;
      --muted:     #6b7280;
      --dim:       #4b5563;
      --accent:    #3b82f6;
      --accent-dim:#1d4ed8;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #eab308;
      --amber:     #f59e0b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* ── Login ─────────────────────────────────────────────────────────── */

    #loginWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
    }

    .login-card h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── App shell ──────────────────────────────────────────────────────── */

    #appWrap { display: none; flex-direction: column; flex: 1; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .brand span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 14px; }

    .user-badge {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .role-pill {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .role-admin     { background: #1a1205; color: var(--amber); border: 1px solid #3d2a00; }
    .role-associate { background: #0a1628; color: #60a5fa;      border: 1px solid #1d3a6e; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 20px;
      overflow-y: auto;
    }

    /* ── Cards ──────────────────────────────────────────────────────────── */

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    /* ── Form controls ──────────────────────────────────────────────────── */

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    select {
      display: block;
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      font-size: 13px;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    select { cursor: pointer; }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }
    input[type="file"]::file-selector-button {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      padding: 3px 10px;
      margin-right: 10px;
      cursor: pointer;
    }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    .hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 16px; }

    /* ── Buttons ────────────────────────────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent-dim); width: 100%; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dim); }

    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border2); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: #555; }

    .btn-sm { padding: 5px 11px; font-size: 11px; }

    .btn-dl  { background: #0a1628; color: #60a5fa; border-color: #1d3a6e; }
    .btn-dl:hover:not(:disabled)  { background: #1d3a6e; }
    .btn-up  { background: #0a1a0a; color: #4ade80; border-color: #1a3a1a; }
    .btn-up:hover:not(:disabled)  { background: #1a3a1a; }
    .btn-danger { background: #1a0808; color: #f87171; border-color: #3a1a1a; }

    /* ── Status banners ─────────────────────────────────────────────────── */

    .status {
      margin-top: 14px;
      font-size: 12px;
      padding: 9px 12px;
      border-radius: 5px;
      display: none;
      line-height: 1.5;
    }
    .status.show   { display: block; }
    .status.info   { background: #0a1628; color: #93c5fd; border: 1px solid #1d3a6e; }
    .status.ok     { background: #0a1a0a; color: #86efac; border: 1px solid #1a3a1a; }
    .status.error  { background: #1a0808; color: #fca5a5; border: 1px solid #3a1a1a; }
    .status.warn   { background: #1a1205; color: #fde68a; border: 1px solid #3d2a00; }

    /* ── Job status bar ─────────────────────────────────────────────────── */

    #jobPanel { display: none; }

    .job-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .job-row:last-child { border-bottom: none; }

    .job-info { flex: 1; min-width: 0; }
    .job-id   { font-size: 11px; color: var(--dim); font-family: monospace; }
    .job-check { font-size: 12px; font-weight: 500; color: var(--text); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .badge-queued  { background: #1a1205; color: var(--amber);  border: 1px solid #3d2a00; }
    .badge-running { background: #0a1628; color: #60a5fa;       border: 1px solid #1d3a6e; }
    .badge-done    { background: #0a1a0a; color: var(--green);  border: 1px solid #1a3a1a; }
    .badge-failed  { background: #1a0808; color: var(--red);    border: 1px solid #3a1a1a; }

    .pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── Admin panel ────────────────────────────────────────────────────── */

    #adminPanel { max-width: 680px; display: none; }

    .admin-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .admin-row:last-child { border-bottom: none; }

    .check-name  { font-size: 12px; font-weight: 500; color: var(--text); }
    .check-sheet { font-size: 11px; color: var(--dim); }

    .upload-wrap { display: flex; align-items: center; gap: 6px; }
    .upload-wrap input[type="file"] { width: 160px; padding: 5px 8px; font-size: 11px; }
    .upload-wrap input[type="file"]::file-selector-button { padding: 2px 7px; font-size: 11px; margin-right: 6px; }

    .up-st { font-size: 11px; min-width: 40px; text-align: center; }
    .up-st.ok  { color: var(--green); }
    .up-st.err { color: var(--red); }

    footer {
      text-align: center;
      font-size: 11px;
      color: #1f1f1f;
      padding: 14px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN ════════════════════════════════════════════════════════════ -->
<div id="loginWrap">
  <div class="login-card">
    <h1>AuditForge</h1>
    <p>Deterministic configuration audit</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" value="admin@auditforge.local"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPw" value="admin123"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="status" id="loginErr"></div>
    <br>
    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">Sign in</button>
  </div>
</div>

<!-- ═══ APP ══════════════════════════════════════════════════════════════ -->
<div id="appWrap">
  <header>
    <div class="brand">Audit<span>Forge</span></div>
    <div class="header-right">
      <div class="user-badge">
        <span id="hdrEmail"></span>
        <span class="role-pill" id="hdrRole"></span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>

    <!-- Audit form -->
    <div class="card">
      <div class="card-title">New Audit</div>

      <div class="field">
        <label>Audit Check</label>
        <select id="checkSel" onchange="onCheckChange()">
          <option value="">— select a check —</option>
        </select>
      </div>

      <div class="field">
        <label>Client File <span style="color:var(--dim);font-weight:400;text-transform:none">.xlsx / .xls / .csv</span></label>
        <input type="file" id="actualFile" accept=".xlsx,.xls,.csv" onchange="checkFormReady()">
      </div>

      <hr class="divider">

      <div class="row">
        <div class="field">
          <label>Sheet Name</label>
          <input type="text" id="sheetName" placeholder="auto">
          <p class="hint" id="sheetHint"></p>
        </div>
        <div class="field">
          <label>Fuzzy Threshold</label>
          <input type="number" id="fuzzyThresh" value="80" min="50" max="100">
        </div>
      </div>

      <button class="btn btn-primary" id="runBtn" onclick="submitAudit()" disabled>
        Run Audit
      </button>
      <div class="status" id="auditStatus"></div>
    </div>

    <!-- Job tracker -->
    <div class="card" id="jobPanel">
      <div class="card-title">Jobs</div>
      <div id="jobList"></div>
    </div>

    <!-- Admin panel (admin role only) -->
    <div class="card" id="adminPanel">
      <div class="card-title" style="color:var(--amber)">Ideal File Management</div>
      <div id="adminList"></div>
    </div>

    <!-- User management (admin role only) -->
    <div class="card" id="userPanel" style="max-width:680px;display:none">
      <div class="card-title" style="color:var(--amber)">User Management</div>

      <!-- Create user form -->
      <div style="display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end;margin-bottom:18px">
        <div>
          <label>Email</label>
          <input type="email" id="newEmail" placeholder="user@company.com">
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="newPw" placeholder="min 8 chars">
        </div>
        <div>
          <label>Role</label>
          <select id="newRole">
            <option value="associate">Associate</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button class="btn btn-up btn-sm" style="margin-bottom:1px" onclick="createUser()">Add User</button>
      </div>
      <div class="status" id="userStatus"></div>

      <!-- User list -->
      <div id="userList" style="margin-top:16px"></div>
    </div>

  </main>
</div>

<footer>AuditForge v2.0</footer>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
let _token = sessionStorage.getItem('af_token');
let _user  = null;
let _jobs  = {};   // jobId → { check_id, status, timer }

// ── Bootstrap ────────────────────────────────────────────────────────────────
(async () => {
  if (_token) {
    try { await initApp(); return; } catch { /* token expired */ }
  }
  showLogin();
})();

// ── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginErr');

  err.className = 'status';
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const form = new URLSearchParams({ username: email, password: pw });
  try {
    const res = await fetch('/auth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: form,
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || 'Login failed');
    }
    const data = await res.json();
    _token = data.access_token;
    sessionStorage.setItem('af_token', _token);
    await initApp();
  } catch (e) {
    err.textContent = e.message;
    err.className = 'status show error';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function logout() {
  _token = null;
  _user  = null;
  sessionStorage.removeItem('af_token');
  Object.values(_jobs).forEach(j => clearInterval(j.timer));
  _jobs = {};
  showLogin();
}

function showLogin() {
  // Hard-reset every piece of UI state that could be stale after logout
  const btn = document.getElementById('loginBtn');
  btn.disabled    = false;
  btn.textContent = 'Sign in';

  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPw').value    = '';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('loginErr').className   = 'status';

  // Hide app panels
  document.getElementById('appWrap').style.display   = 'none';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('userPanel').style.display  = 'none';
  document.getElementById('jobPanel').style.display   = 'none';

  // Clear job list so previous user's jobs don't flash on next login
  document.getElementById('jobList').innerHTML = '';

  // Reset audit form
  document.getElementById('checkSel').selectedIndex = 0;
  document.getElementById('actualFile').value        = '';
  document.getElementById('sheetName').value         = '';
  document.getElementById('auditStatus').textContent = '';
  document.getElementById('auditStatus').className   = 'status';
  document.getElementById('runBtn').disabled         = true;

  // Reset user management form (visible to admins on re-login)
  document.getElementById('newEmail').value       = '';
  document.getElementById('newPw').value          = '';
  document.getElementById('newRole').selectedIndex = 0;
  document.getElementById('userStatus').textContent = '';
  document.getElementById('userStatus').className   = 'status';

  // Reset fuzzy threshold to default
  document.getElementById('fuzzyThresh').value = '80';

  document.getElementById('loginWrap').style.display = 'flex';
}

// ── App init ──────────────────────────────────────────────────────────────────
async function initApp() {
  // Decode JWT payload to get user info (no verification needed client-side)
  const parts = _token.split('.');
  _user = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));

  document.getElementById('hdrEmail').textContent = _user.sub.slice(0, 8) + '…';
  const rolePill = document.getElementById('hdrRole');
  rolePill.textContent = _user.role;
  rolePill.className = 'role-pill ' + (_user.role === 'admin' ? 'role-admin' : 'role-associate');

  await loadChecks();
  await loadJobHistory();

  if (_user.role === 'admin') {
    await loadAdminPanel();
    await loadUsers();
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('userPanel').style.display  = 'block';
  }

  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display   = 'flex';
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { Authorization: `Bearer ${_token}` },
  };
  if (body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res;
}

// ── Checks ────────────────────────────────────────────────────────────────────
let _checks = [];

async function loadChecks() {
  const res = await fetch('/api/checks');
  _checks = await res.json();
  const sel = document.getElementById('checkSel');
  sel.innerHTML = '<option value="">— select a check —</option>';
  _checks.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.name;
    o.dataset.sheet = c.default_sheet || '';
    sel.appendChild(o);
  });
}

function onCheckChange() {
  const sel = document.getElementById('checkSel');
  const sheet = sel.options[sel.selectedIndex]?.dataset.sheet || '';
  document.getElementById('sheetName').value = sheet;
  document.getElementById('sheetHint').textContent = sheet
    ? 'Auto-filled — override if needed'
    : 'Leave blank for CSV or single-sheet files';
  checkFormReady();
}

function checkFormReady() {
  const hasCheck = document.getElementById('checkSel').value !== '';
  const hasFile  = document.getElementById('actualFile').files.length > 0;
  document.getElementById('runBtn').disabled = !(hasCheck && hasFile);
}

// ── Submit audit ──────────────────────────────────────────────────────────────
async function submitAudit() {
  const checkId   = document.getElementById('checkSel').value;
  const checkName = document.getElementById('checkSel').options[document.getElementById('checkSel').selectedIndex].textContent;
  const sheet     = document.getElementById('sheetName').value.trim();
  const threshold = parseInt(document.getElementById('fuzzyThresh').value) || 80;
  const file      = document.getElementById('actualFile').files[0];
  const btn       = document.getElementById('runBtn');
  const st        = document.getElementById('auditStatus');

  btn.disabled = true;
  setStatus(st, 'info', `Submitting ${checkName}…`);

  const form = new FormData();
  form.append('actual_file', file);
  form.append('check_id', checkId);
  form.append('sheet_name', sheet);
  form.append('fuzzy_threshold', threshold);

  try {
    const res = await api('POST', '/api/audits', form);
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    const { job_id } = await res.json();
    setStatus(st, 'ok', `Job submitted — tracking ${job_id.slice(0, 8)}…`);
    trackJob(job_id, checkName);

    // Reset file input
    document.getElementById('actualFile').value = '';
    btn.disabled = true;
  } catch (e) {
    setStatus(st, 'error', e.message);
    btn.disabled = false;
  }
}

// ── Job tracking ──────────────────────────────────────────────────────────────
function trackJob(jobId, checkName) {
  _jobs[jobId] = { checkName, status: 'queued', timer: null };
  renderJobs();

  const timer = setInterval(async () => {
    try {
      const res = await api('GET', `/api/audits/${jobId}`);
      if (!res.ok) return;
      const data = await res.json();
      _jobs[jobId].status = data.status;
      _jobs[jobId].error  = data.error_message;
      renderJobs();
      if (data.status === 'done' || data.status === 'failed') {
        clearInterval(_jobs[jobId].timer);
      }
    } catch { /* retry next tick */ }
  }, 2000);

  _jobs[jobId].timer = timer;
}

function renderJobs() {
  const panel = document.getElementById('jobPanel');
  const list  = document.getElementById('jobList');

  if (Object.keys(_jobs).length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';

  list.innerHTML = Object.entries(_jobs).reverse().map(([id, j]) => {
    const badgeClass = {
      queued:  'badge-queued',
      running: 'badge-running pulse',
      done:    'badge-done',
      failed:  'badge-failed',
    }[j.status] || 'badge-queued';

    const dlBtn = j.status === 'done'
      ? `<button class="btn btn-dl btn-sm" onclick="downloadReport('${id}','${j.checkName}')">Download</button>`
      : '';

    const retryBtn = j.status === 'failed'
      ? `<button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text)" onclick="retryJob('${id}','${j.checkName}')">Retry</button>`
      : '';

    const errTip = j.status === 'failed' && j.error
      ? `<div style="font-size:11px;color:var(--red);margin-top:4px">${escHtml(j.error)}</div>`
      : '';

    return `
      <div class="job-row">
        <div class="job-info">
          <div class="job-check">${j.checkName}</div>
          <div class="job-id">${id.slice(0, 8)}…</div>
          ${errTip}
        </div>
        <span class="badge ${badgeClass}">${j.status}</span>
        ${dlBtn}${retryBtn}
      </div>`;
  }).join('');
}

async function downloadReport(jobId, checkName) {
  try {
    const res = await api('GET', `/api/audits/${jobId}/download`);
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `AuditForge_${checkName.replace(/\s+/g,'_')}_${jobId.slice(0,8)}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    alert(e.message);
  }
}

async function retryJob(jobId, checkName) {
  try {
    const res = await api('POST', `/api/audits/${jobId}/retry`);
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || 'Retry failed');
    }
    const { job_id } = await res.json();
    // Remove old failed entry, start tracking the new job
    delete _jobs[jobId];
    trackJob(job_id, checkName);
  } catch (e) {
    alert(e.message);
  }
}

// ── Job history (on login) ────────────────────────────────────────────────────
async function loadJobHistory() {
  try {
    const res = await api('GET', '/api/audits');
    if (!res.ok) return;
    const jobs = await res.json();
    jobs.forEach(j => {
      if (_jobs[j.id]) return; // already tracked live
      _jobs[j.id] = { checkName: j.check_id, status: j.status, error: j.error_message, timer: null };
      // Resume polling for any still-running jobs
      if (j.status === 'queued' || j.status === 'running') trackJob(j.id, j.check_id);
    });
    renderJobs();
  } catch { /* non-fatal */ }
}

// ── Admin panel ───────────────────────────────────────────────────────────────
async function loadAdminPanel() {
  const res = await api('GET', '/api/ideals');
  const ideals = res.ok ? await res.json() : [];

  // Index active ideals by check_id
  const byCheck = {};
  ideals.forEach(i => byCheck[i.check_id] = i);

  document.getElementById('adminList').innerHTML = _checks.map(c => {
    const active = byCheck[c.id];
    const version = active ? `v${active.version}` : 'bundled';
    const hash    = active ? active.content_hash.slice(0,12) + '…' : '—';

    return `
      <div class="admin-row">
        <div>
          <div class="check-name">${c.name}</div>
          <div class="check-sheet">${c.default_sheet || 'CSV/auto'} &nbsp;·&nbsp; ${version} &nbsp;·&nbsp; <span style="font-family:monospace;font-size:10px;color:var(--dim)">${hash}</span></div>
        </div>
        <button class="btn btn-dl btn-sm" onclick="downloadIdeal('${c.id}','${c.name}')">Download</button>
        <div class="upload-wrap">
          <input type="file" id="upf-${c.id}" accept=".xlsx,.xls,.csv"
                 onchange="document.getElementById('upb-${c.id}').disabled=!this.files.length">
          <button class="btn btn-up btn-sm" id="upb-${c.id}" disabled
                  onclick="uploadIdeal('${c.id}')">Upload</button>
        </div>
        <span class="up-st" id="ups-${c.id}"></span>
      </div>`;
  }).join('');
}

async function downloadIdeal(checkId, name) {
  try {
    const res = await api('GET', `/api/ideals/${checkId}/download`);
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${checkId}_ideal.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) { alert(e.message); }
}

async function uploadIdeal(checkId) {
  const fi  = document.getElementById(`upf-${checkId}`);
  const btn = document.getElementById(`upb-${checkId}`);
  const st  = document.getElementById(`ups-${checkId}`);
  if (!fi.files.length) return;

  btn.disabled = true;
  st.textContent = '…';
  st.className = 'up-st';

  const form = new FormData();
  form.append('file', fi.files[0]);

  try {
    const res = await api('POST', `/api/ideals/${checkId}`, form);
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || 'Upload failed');
    }
    st.textContent = 'Saved ✓';
    st.className = 'up-st ok';
    fi.value = '';
    await loadAdminPanel(); // refresh versions
  } catch (e) {
    st.textContent = e.message;
    st.className = 'up-st err';
    btn.disabled = false;
  }
}

// ── User management ───────────────────────────────────────────────────────────
async function loadUsers() {
  const res = await api('GET', '/api/users');
  const users = res.ok ? await res.json() : [];

  document.getElementById('userList').innerHTML = users.length === 0
    ? '<p style="color:var(--dim);font-size:12px">No users yet.</p>'
    : users.map(u => `
      <div style="display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
        <div>
          <span style="font-size:12px;color:var(--text)">${u.email}</span>
        </div>
        <span class="role-pill ${u.role === 'admin' ? 'role-admin' : 'role-associate'}">${u.role}</span>
        <span style="font-size:11px;color:${u.is_active ? 'var(--green)' : 'var(--dim)'}">${u.is_active ? 'Active' : 'Inactive'}</span>
        ${u.is_active
          ? `<button class="btn btn-danger btn-sm" onclick="deactivateUser('${u.id}','${u.email}')">Deactivate</button>`
          : '<span style="width:75px"></span>'}
      </div>`).join('');
}

async function createUser() {
  const email = document.getElementById('newEmail').value.trim();
  const pw    = document.getElementById('newPw').value;
  const role  = document.getElementById('newRole').value;
  const st    = document.getElementById('userStatus');

  if (!email || !pw) { setStatus(st, 'error', 'Email and password are required.'); return; }
  if (pw.length < 8)  { setStatus(st, 'error', 'Password must be at least 8 characters.'); return; }

  setStatus(st, 'info', 'Creating…');
  try {
    const res = await api('POST', '/api/users', { email, password: pw, role });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    const u = await res.json();
    setStatus(st, 'ok', `Created ${u.email} (${u.role})`);
    document.getElementById('newEmail').value = '';
    document.getElementById('newPw').value    = '';
    await loadUsers();
  } catch (e) {
    setStatus(st, 'error', e.message);
  }
}

async function deactivateUser(id, email) {
  if (!confirm(`Deactivate ${email}? They will no longer be able to log in.`)) return;
  const st = document.getElementById('userStatus');
  try {
    const res = await api('DELETE', `/api/users/${id}`);
    if (!res.ok && res.status !== 204) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || `HTTP ${res.status}`);
    }
    setStatus(st, 'warn', `${email} deactivated.`);
    await loadUsers();
  } catch (e) {
    setStatus(st, 'error', e.message);
  }
}

// ── Utility ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(el, type, msg) {
  el.textContent = msg;
  el.className = `status show ${type}`;
}
</script>
